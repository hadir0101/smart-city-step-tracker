<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StepTrack — Smart City Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --border: rgba(99,179,237,0.15);
    --accent: #63b3ed;
    --text: #e2e8f0;
    --muted: #718096;
    --green: #68d391;
    --orange: #f6ad55;
    --red: #fc8181;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  .logo { display: flex; align-items: center; gap: 12px; }

  .logo-icon {
    width: 36px; height: 36px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
  }

  .logo-icon svg { width: 20px; height: 20px; fill: #0a0e1a; }

  h1 { font-size: 1.2rem; font-weight: 500; letter-spacing: -0.02em; }
  .subtitle { font-size: 0.75rem; color: var(--muted); font-family: 'DM Mono', monospace; }

  .live-badge {
    display: flex; align-items: center; gap: 6px;
    font-size: 0.7rem; font-family: 'DM Mono', monospace;
    color: var(--green);
    background: rgba(104,211,145,0.1);
    padding: 4px 10px; border-radius: 20px;
    border: 1px solid rgba(104,211,145,0.2);
  }

  .live-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 1rem;
    margin-bottom: 2rem;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
    position: relative;
    overflow: hidden;
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }

  .stat-card.blue::before  { background: var(--accent); }
  .stat-card.green::before { background: var(--green); }
  .stat-card.orange::before { background: var(--orange); }
  .stat-card.red::before   { background: var(--red); }

  .stat-label {
    font-size: 0.7rem;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 0.5rem;
  }

  .stat-value {
    font-size: 1.8rem;
    font-weight: 300;
    letter-spacing: -0.03em;
    line-height: 1;
  }

  .stat-value.blue   { color: var(--accent); }
  .stat-value.green  { color: var(--green); }
  .stat-value.orange { color: var(--orange); }
  .stat-value.red    { color: var(--red); }

  .stat-sub {
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 0.4rem;
  }

  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 1rem;
  }

  .chart-title {
    font-size: 0.75rem;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 1.25rem;
  }

  canvas { max-height: 320px; }

  .footer {
    margin-top: 2rem;
    text-align: center;
    font-size: 0.7rem;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
  }

  @media (max-width: 700px) {
    body { padding: 1rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2a7 7 0 0 1 7 7c0 5.25-7 13-7 13S5 14.25 5 9a7 7 0 0 1 7-7zm0 9.5a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5z"/></svg>
    </div>
    <div>
      <h1>StepTrack</h1>
      <div class="subtitle">Smart City Activity Dashboard</div>
    </div>
  </div>
  <div class="live-badge">
    <div class="live-dot"></div>
    LIVE DATA
  </div>
</header>

<div class="stats-grid">
  <div class="stat-card blue">
    <div class="stat-label">Avg Daily Steps</div>
    <div class="stat-value blue" id="avg">—</div>
    <div class="stat-sub">steps per day</div>
  </div>
  <div class="stat-card green">
    <div class="stat-label">Best Day</div>
    <div class="stat-value green" id="best">—</div>
    <div class="stat-sub">personal record</div>
  </div>
  <div class="stat-card orange">
    <div class="stat-label">Days Tracked</div>
    <div class="stat-value orange" id="days">—</div>
    <div class="stat-sub">total days</div>
  </div>
  <div class="stat-card red">
    <div class="stat-label">Goal Days</div>
    <div class="stat-value red" id="goals">—</div>
    <div class="stat-sub">reached 10k steps</div>
  </div>
</div>

<div class="chart-card">
  <div class="chart-title">Daily Steps — Last 30 Days</div>
  <canvas id="dailyChart"></canvas>
</div>

<div class="footer">
  Data source: iPhone Health App · Accelerometer-based step detection · Smart City Project B1
</div>

<script>
async function loadStats() {
  const res = await fetch('/api/stats');
  const d = await res.json();
  document.getElementById('avg').textContent = d.avg_daily.toLocaleString();
  document.getElementById('best').textContent = d.best_day.toLocaleString();
  document.getElementById('days').textContent = d.days_tracked;
  document.getElementById('goals').textContent = d.goal_days;
}

async function loadDailyChart() {
  const res = await fetch('/api/daily');
  const d = await res.json();

  const colors = d.values.map(v =>
    v >= 10000 ? 'rgba(104,211,145,0.8)' :
    v >= 5000  ? 'rgba(99,179,237,0.8)' :
                 'rgba(246,173,85,0.8)'
  );

  new Chart(document.getElementById('dailyChart'), {
    type: 'bar',
    data: {
      labels: d.labels,
      datasets: [{
        data: d.values,
        backgroundColor: colors,
        borderRadius: 4,
        borderSkipped: false,
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => `${ctx.parsed.y.toLocaleString()} steps`
          }
        }
      },
      scales: {
        x: {
          ticks: { color: '#718096', font: { size: 10 }, maxRotation: 45 },
          grid: { color: 'rgba(255,255,255,0.05)' }
        },
        y: {
          ticks: {
            color: '#718096',
            callback: v => v >= 1000 ? (v/1000).toFixed(0)+'k' : v
          },
          grid: { color: 'rgba(255,255,255,0.05)' }
        }
      }
    }
  });
}

loadStats();
loadDailyChart();
</script>
</body>
</html>
